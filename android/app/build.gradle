apply plugin: 'com.android.application'

def versionPropsFile = file('version.properties')
def buildVersionCode = 1
def buildVersionName = "1.0.0"
if (versionPropsFile.exists()) {
    def props = new Properties()
    props.load(new FileInputStream(versionPropsFile))
    buildVersionCode = props['VERSION_CODE']?.toInteger() ?: 1
    buildVersionName = props['VERSION_NAME'] ?: "1.0.0"
}

android {
    namespace "com.axion.app"
    compileSdk 35
    defaultConfig {
        applicationId "com.axion.app"
        minSdk 26
        targetSdk 34
        versionCode buildVersionCode
        versionName buildVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }
    signingConfigs {
        release {
            storeFile file("axion-release.keystore")
            storePassword System.getenv("KEYSTORE_PASSWORD") ?: ""
            keyAlias System.getenv("KEYSTORE_ALIAS") ?: "axion-key"
            keyPassword System.getenv("KEYSTORE_KEY_PASSWORD") ?: ""
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation project(':capacitor-android')
    implementation project(':capacitor-cordova-android-plugins')
    implementation 'androidx.core:core-splashscreen:1.0.1'
}

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.exists()) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json issue")
}
