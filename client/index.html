<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="description" content="نظام احترافي لإدارة وتحليل المشاريع الإنشائية" />
    <meta name="theme-color" content="#3b82f6" />
    <title>إدارة المشاريع الإنشائية</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="مشروعي">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="icon" href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🏗️%3C/text%3E%3C/svg%3E" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" onerror="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet"></noscript>
    <style>
      @font-face {
        font-family: 'Cairo';
        font-style: normal;
        font-weight: 300 700;
        font-display: swap;
        src: local('Cairo'), local('Tajawal'), local('Arial');
      }
      #initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: 'Cairo', sans-serif;
        direction: rtl;
        transition: opacity 0.4s ease-out;
      }
      .loader-content { text-align: center; z-index: 10000; }
      #root { opacity: 0; transition: opacity 0.4s ease-in; }
      .loader-logo { width: 80px; height: 80px; margin: 0 auto 24px; position: relative; }
      .logo-ring { position: absolute; border: 3px solid transparent; border-radius: 50%; animation: spin 2s linear infinite; }
      .logo-ring:nth-child(1) { width: 80px; height: 80px; border-top-color: #3b82f6; }
      .logo-ring:nth-child(2) { width: 60px; height: 60px; top: 10px; left: 10px; border-right-color: #fbbf24; animation-direction: reverse; }
      .loader-title { font-size: 22px; font-weight: 700; color: #1e293b; margin-bottom: 8px; }
      .loader-subtitle { font-size: 14px; color: #64748b; }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="initial-loader">
      <div class="loader-content">
        <div class="loader-logo">
          <div class="logo-ring"></div>
          <div class="logo-ring"></div>
          <div style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 32px;">🏗️</div>
        </div>
        <h1 class="loader-title">نظام إدارة المشاريع الإنشائية</h1>
        <p class="loader-subtitle">جاري تحميل التطبيق...</p>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      function hideLoader() {
        const loader = document.getElementById('initial-loader');
        const root = document.getElementById('root');
        if (loader) {
          loader.style.opacity = '0';
          loader.style.pointerEvents = 'none';
          if (root) root.style.opacity = '1';
          setTimeout(() => { loader.style.display = 'none'; }, 500);
        }
      }
      let checkCount = 0;
      function checkForContent() {
        checkCount++;
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          console.log('✅ React content detected');
          hideLoader();
        } else if (checkCount < 100) {
          setTimeout(checkForContent, 100);
        } else {
          console.log('⏱️ Timeout, forcing hide');
          hideLoader();
        }
      }
      window.addEventListener('load', checkForContent);
      setTimeout(checkForContent, 500);
    </script>
  </body>
</html>
